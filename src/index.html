<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="실버스텝 - 시니어를 위한 AI 홈트레이닝 코치. 3m 거리에서 음성으로 안내받는 안전한 운동.">
  <title>실버스텝 Silver Step - AI 홈트레이닝</title>

  <!-- PWA 메타 태그 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF7043">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="실버스텝">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <!-- 스타일 -->
  <link rel="stylesheet" href="css/style.css">

  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="app-container">

    <!-- ========================
         카메라 & 캔버스 레이어
         ======================== -->
    <div class="camera-container">
      <video id="camera-video" autoplay playsinline></video>
      <canvas id="pose-canvas"></canvas>
      <div class="camera-blur-overlay" id="camera-blur"></div>
      <div class="camera-vignette"></div>
    </div>

    <!-- ========================
         UI 오버레이
         ======================== -->
    <div class="ui-overlay">

      <!-- 상단: 상태 표시 + 타이머 -->
      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-text" id="status-text">대기 중</span>
        </div>
        <div class="exercise-timer" id="exercise-timer">
          <span class="timer-icon">⏱️</span>
          <span class="timer-text" id="timer-text">00:00</span>
        </div>
      </div>

      <!-- 중앙: 운동 종류 + 카운트 표시 -->
      <div class="count-display">
        <div class="exercise-type" id="exercise-type">🙌 만세 운동</div>
        <div class="count-number" id="count-number">0</div>
        <div class="count-target" id="count-target">/ 10</div>
      </div>

      <!-- 하단: 메시지 & 프로그레스 -->
      <div class="message-container">
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-text" id="progress-text">0 / 10</div>
        </div>
        <div class="message-display" id="message-display">
          <div class="message-text" id="message-text">시작 버튼을 눌러주세요</div>
        </div>
      </div>

    </div>

    <!-- ========================
         시작 화면
         ======================== -->
    <div class="start-screen" id="start-screen">
      <div class="app-logo">
        <span class="app-logo-icon">🚶‍♂️</span>
        <h1 class="app-title">실버스텝</h1>
        <p class="app-subtitle">AI가 지켜보는 안심 홈트레이닝</p>
      </div>

      <!-- 사용법 안내 -->
      <div class="usage-guide">
        <div class="guide-item">
          <span class="guide-icon">📏</span>
          <span class="guide-text">스마트폰에서 3m 떨어져 주세요</span>
        </div>
        <div class="guide-item">
          <span class="guide-icon">🧍</span>
          <span class="guide-text">전신이 카메라에 보이게 서 주세요</span>
        </div>
        <div class="guide-item">
          <span class="guide-icon">🔊</span>
          <span class="guide-text">음성 안내를 따라 운동해 주세요</span>
        </div>
      </div>

      <!-- 운동 선택 -->
      <div class="exercise-selector" id="exercise-selector">
        <h2 class="selector-title">오늘의 운동을 선택하세요</h2>
        <div class="exercise-cards">
          <button class="exercise-card selected" id="card-manse" data-exercise="manse">
            <span class="card-icon">🙌</span>
            <span class="card-name">만세 운동</span>
            <span class="card-desc">팔을 위로 올렸다 내려요</span>
          </button>
          <button class="exercise-card" id="card-knee-raise" data-exercise="knee_raise">
            <span class="card-icon">🦵</span>
            <span class="card-name">무릎 올리기</span>
            <span class="card-desc">무릎을 번갈아 올려요</span>
          </button>
        </div>
      </div>

      <button class="start-button" id="start-button">
        운동 시작하기
      </button>
    </div>

    <!-- ========================
         카운트다운 오버레이
         ======================== -->
    <div class="countdown-overlay" id="countdown-overlay">
      <div class="countdown-number" id="countdown-number">3</div>
    </div>

    <!-- ========================
         운동 완료 화면
         ======================== -->
    <div class="complete-screen" id="complete-screen">
      <!-- 축하 파티클 -->
      <div class="confetti-container" id="confetti-container">
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
      </div>

      <div class="complete-icon">🎉</div>
      <h2 class="complete-title">오늘의 운동 완료!</h2>
      <div class="complete-stats">
        <div class="stat-card">
          <div class="stat-value" id="complete-total-reps">0</div>
          <div class="stat-label">총 횟수</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="complete-duration">0초</div>
          <div class="stat-label">운동 시간</div>
        </div>
      </div>

      <!-- 버튼 그룹 -->
      <div class="complete-actions">
        <button class="notify-button" id="notify-button">
          📱 자녀에게 알림 보내기
        </button>
        <button class="restart-button" id="restart-button">
          다시 운동하기
        </button>
      </div>
    </div>

    <!-- ========================
         에러 화면 (카메라 권한 등)
         ======================== -->
    <div class="error-screen" id="error-screen">
      <div class="error-icon">📷</div>
      <h2 class="error-title">카메라를 켜 주세요</h2>
      <p class="error-message" id="error-message">
        운동을 시작하려면 카메라 사용을 허용해야 합니다.<br>
        브라우저의 카메라 권한을 확인해 주세요.
      </p>
      <button class="error-retry-button" id="error-retry-button">
        다시 시도하기
      </button>
    </div>

    <!-- ========================
         디버그 패널 (개발용)
         ======================== -->
    <div class="debug-panel" id="debug-panel">
      <h3>🔬 디버그</h3>
      <div class="debug-row">
        <span class="debug-label">FPS</span>
        <span class="debug-value" id="debug-fps">-</span>
      </div>
      <div class="debug-row">
        <span class="debug-label">상태</span>
        <span class="debug-value" id="debug-state">-</span>
      </div>
      <div class="debug-row">
        <span class="debug-label">왼쪽</span>
        <span class="debug-value" id="debug-knee-l">-</span>
      </div>
      <div class="debug-row">
        <span class="debug-label">오른쪽</span>
        <span class="debug-value" id="debug-knee-r">-</span>
      </div>
      <hr class="debug-divider">
      <div class="debug-row">
        <span class="debug-label">신뢰도</span>
        <span class="debug-value" id="debug-confidence">-</span>
      </div>
    </div>

  </div>

  <!-- 앱 메인 로직 (ES Module) -->
  <script type="module" src="js/app.js"></script>

  <!-- 서비스 워커 등록 (PWA) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => {
            console.log('[PWA] 서비스 워커 등록 완료:', reg.scope);
          })
          .catch((err) => {
            console.warn('[PWA] 서비스 워커 등록 실패:', err);
          });
      });
    }
  </script>
</body>
</html>
